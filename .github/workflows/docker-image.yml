name: Docker Image CI
on:
  push:
    tags: ['v[0-9].[0-9]+.[0-9]+']
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Build the Docker image
      if: github.event_name == 'pull_request'
      run: |
        ./containers/compile_dockerfile.sh
        docker buildx build --no-cache \
          --platform linux/amd64 \
          -t quay.io/krkn-chaos/krkn \
          -t quay.io/redhat-chaos/krkn  \
          containers/ \
          --build-arg PR_NUMBER=${{ github.event.pull_request.number }}

    - name: Login to krkn-chaos quay
      if: startsWith(github.ref, 'refs/tags')
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}

    - name: Build and push krkn-hub (amd64 only)
      if: startsWith(github.ref, 'refs/tags')
      run: |
        ./containers/compile_dockerfile.sh
        TAG=${GITHUB_REF#refs/tags/}
        docker buildx build --no-cache \
          --platform linux/amd64 \
          --provenance=false \
          -t quay.io/krkn-chaos/krkn:latest \
          -t quay.io/krkn-chaos/krkn:${TAG} \
          containers/ \
          --build-arg TAG=${TAG} \
          --push

    - name: Login to redhat-chaos quay
      if: startsWith(github.ref, 'refs/tags')
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USER_1 }}
        password: ${{ secrets.QUAY_TOKEN_1 }}

    - name: Build and push krkn-hub-multiarch (amd64)
      if: startsWith(github.ref, 'refs/tags')
      run: |
        ./containers/compile_dockerfile.sh
        TAG=${GITHUB_REF#refs/tags/}
        docker buildx build --no-cache \
          --platform linux/amd64 \
          --provenance=false \
          -t quay.io/redhat-chaos/krkn:latest \
          -t quay.io/redhat-chaos/krkn:${TAG} \
          containers/ \
          --build-arg TAG=${TAG} \
          --push

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Build the Docker image
      if: github.event_name == 'pull_request'
      run: |
        ./containers/compile_dockerfile.sh
        docker buildx build --no-cache \
          --platform linux/arm64 \
          -t quay.io/redhat-chaos/krkn  \
          containers/ \
          --build-arg PR_NUMBER=${{ github.event.pull_request.number }}

    - name: Login to redhat-chaos quay
      if: startsWith(github.ref, 'refs/tags')
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USER_1 }}
        password: ${{ secrets.QUAY_TOKEN_1 }}

    - name: Build and push krkn-hub-multiarch (arm64)
      if: startsWith(github.ref, 'refs/tags')
      run: |
        ./containers/compile_dockerfile.sh
        TAG=${GITHUB_REF#refs/tags/}
        docker buildx build --no-cache \
          --platform linux/arm64 \
          --provenance=false \
          -t quay.io/redhat-chaos/krkn:latest \
          -t quay.io/redhat-chaos/krkn:${TAG} \
          containers/ \
          --build-arg TAG=${TAG} \
          --push

  rebuild-krkn-hub:
    runs-on: ubuntu-latest
    needs: build-amd64
    if: startsWith(github.ref, 'refs/tags')
    steps:
    - name: Rebuild krkn-hub
      uses: redhat-chaos/actions/krkn-hub@main
      with:
        QUAY_USER: ${{ secrets.QUAY_USERNAME }}
        QUAY_TOKEN: ${{ secrets.QUAY_PASSWORD }}
        AUTOPUSH: ${{ secrets.AUTOPUSH }}
