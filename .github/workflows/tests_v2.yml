name: Tests v2 (pytest functional)
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  tests-v2:
    name: Tests v2 (pytest functional)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af
          df -h

      - name: Create KinD cluster
        uses: redhat-chaos/actions/kind@aa421229ca6d4ad13785039d0736611c6439fc3e # main

      - name: Pre-load test images into KinD
        run: |
          docker pull nginx:alpine
          kind load docker-image nginx:alpine
          docker pull quay.io/krkn-chaos/krkn:tools
          kind load docker-image quay.io/krkn-chaos/krkn:tools

      - name: Install Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get install -y build-essential python3-dev
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r CI/tests_v2/requirements.txt
          # Force setuptools==81.0.0 after all deps (some may try to upgrade it to 82+, which removes pkg_resources)
          pip install --force-reinstall --no-deps setuptools==81.0.0

      - name: Run tests_v2
        run: |
          KRKN_TEST_COVERAGE=1 python -m pytest CI/tests_v2/ -v --timeout=300 --reruns=1 --reruns-delay=5 \
            --html=CI/tests_v2/report.html -n auto --junitxml=CI/tests_v2/results.xml

      - name: Upload tests_v2 artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tests-v2-results
          path: |
            CI/tests_v2/report.html
            CI/tests_v2/results.xml
            CI/tests_v2/assets/
          if-no-files-found: ignore
