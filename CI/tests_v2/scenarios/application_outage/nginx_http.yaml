# Nginx Deployment + Service for application outage traffic test.
# Namespace is patched at deploy time by the test framework.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-outage-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-outage-http
      scenario: outage
  template:
    metadata:
      labels:
        app: nginx-outage-http
        scenario: outage
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-outage-http
spec:
  selector:
    app: nginx-outage-http
  ports:
  - port: 80
    targetPort: 80
