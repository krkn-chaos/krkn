name: pod-kill
description: Forcefully kills pods to test application resiliency and recovery mechanisms
target: kubernetes-pod
risk_level: high
category: availability
tags:
  - pod
  - kill
  - availability
  - termination
  - recovery
parameters:
  - name: name_pattern
    type: string
    description: Regex pattern to match pod names
    default: ^app-.*$
  - name: namespace_pattern
    type: string
    description: Regex pattern to match namespace names
    default: ^default$
  - name: kill
    type: integer
    description: Number of pods to terminate
    default: 1
  - name: kill_mode
    type: string
    description: Kill mode force, graceful, or signal
    default: force
  - name: signal
    type: string
    description: Signal to send for signal mode
    default: SIGKILL
  - name: krkn_pod_recovery_time
    type: integer
    description: Time to wait for pod recovery in seconds
    default: 120
