- id: pod_network_filter
  image: "quay.io/krkn-chaos/krkn-network-chaos:latest"
  wait_duration: 1
  test_duration: 60
  label_selector: "<pod_selector>"
  execution: parallel
  namespace: 'default'
  instance_count: 1
  target: "<pod_name>"
  service_account: ""
  taints: [] # example ["node-role.kubernetes.io/master:NoSchedule"]

  ingress: false
  egress: true
  interfaces: []
  protocols:
    - tcp
    - udp
  ports:
    - 53
  force: false # unused on pod filter scenarios